spring.application.name=notes-api
spring.datasource.url=jdbc:mysql://localhost:3306/notesdb?useSSl=false
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.properties.hibernate.envers.auto_register_listeners=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
logging.level.org.hibernate.tool.schema=DEBUG
security.jwt.expiration-minutes=3600
security.jwt.secret-key=${JWT_SECRET_KEY}
security.rate.capacity=5
security.rate.refill-minutes=1
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.properties.hibernate.envers.audit_table_suffix=_aud
spring.jpa.properties.org.hibernate.envers.revision_field_name=rev
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE