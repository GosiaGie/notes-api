services:
  app:
    platform: linux/amd64
    build: .
    container_name: notes-api-app
    ports:
      - "8080:8080"
    environment:
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - JWT_SECRET_KEY=ilovecatsanddogs
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/notesdb?useSSL=false&allowPublicKeyRetrieval=true
    depends_on:
      db:
        condition: service_healthy
  db:
    platform: linux/amd64
    image: mysql:8.4
    container_name: notes_db
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: notesdb
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: user_notes
      MYSQL_PASSWORD: password_notes
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
volumes:
  db_data: